<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macro-Financial Insights Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="data/dashboard_data.js"></script>
    <style>
        :root {
            /* Gray Scale */
            --gray-25: #FDFDFD;
            --gray-40: #F0F0F0;
            --gray-50: #F9FAFA;
            --gray-100: #F5F5F5;
            --gray-150: #EEEEEE;
            --gray-200: #EDEDEE;
            --gray-300: #D3D4D5;
            --gray-400: #ABADAF;
            --gray-500: #7D7F83;
            --gray-600: #52555A;
            --gray-700: #33373D;
            --gray-800: #1D2025;
            --gray-900: #171A1D;
            --gray-950: #0A0D12;

            /* Primary Scale (Green) */
            --primary-25: #F7FDF9;
            --primary-30: #F3F6F7;
            --primary-50: #EBFAF0;
            --primary-100: #DCF9E8;
            --primary-200: #BCF0D5;
            --primary-300: #8DE2B5;
            --primary-400: #55C390;
            --primary-500: #279C7B;
            --primary-600: #1C8672;
            --primary-700: #137068;
            --primary-800: #0C595A;
            --primary-900: #07434A;
            --primary-950: #052A2E;

            /* Semantic Mappings */
            --bg-color: var(--gray-50);
            --card-bg: var(--gray-25);
            --primary-green: var(--primary-500);
            --dark-green: var(--primary-700);
            --text-main: var(--gray-800);
            --text-sub: var(--gray-500);
            --border-color: var(--gray-200);
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px 0 rgba(0, 0, 0, 0.03);
            --card-radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: 64px; /* Space for fixed nav */
            min-height: 100vh;
        }

        /* Top Navigation Bar */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: white;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            z-index: 1000;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            height: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            color: var(--primary-500);
            font-size: 1.5rem;
            margin-right: 0.5rem;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            height: 100%;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray-500);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0 0.25rem;
            height: 100%;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
            white-space: nowrap;
        }

        .nav-item:hover {
            color: var(--gray-800);
        }

        .nav-item.active {
            color: var(--primary-600);
            border-bottom-color: var(--primary-500);
            font-weight: 700;
        }

        .nav-item svg {
            width: 18px;
            height: 18px;
            stroke-width: 2px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .time-saved {
            background: var(--primary-50);
            color: var(--primary-600);
            padding: 0.4rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid var(--primary-100);
        }

        .nav-icon-btn {
            position: relative;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--gray-500);
            display: flex;
            align-items: center;
        }

        .nav-icon-btn .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            font-weight: 700;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: var(--gray-100);
            color: var(--gray-600);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.875rem;
            border: 1px solid var(--gray-200);
        }

        main {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
            margin-bottom: 1.5rem;
        }


        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-container {
            position: relative;
            flex-grow: 1;
            max-width: 400px;
            margin-bottom: 0;
        }

        .search-input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            transition: all 0.2s;
            font-size: 0.875rem;
        }

        .search-input:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px var(--primary-50);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-sub);
            pointer-events: none;
        }

        .filters {
            display: flex;
            gap: 0.5rem;
        }

        .filter-btn {
            background: white;
            border: 1px solid var(--border-color);
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-sub);
        }

        .filter-btn:hover {
            border-color: var(--primary-green);
            color: var(--primary-green);
            background: var(--primary-25);
        }

        .filter-btn.active {
            background: var(--primary-green);
            border-color: var(--primary-green);
            color: white;
            box-shadow: 0 4px 10px 0 rgba(39, 156, 123, 0.2);
        }

        .subsector-nav {
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            scrollbar-width: none;
        }

        .subsector-nav::-webkit-scrollbar {
            display: none;
        }

        .subsector-btn {
            white-space: nowrap;
            font-size: 0.75rem;
            color: var(--text-sub);
            cursor: pointer;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            border: 1px solid transparent;
        }

        .subsector-btn:hover {
            color: var(--primary-green);
        }

        .section-header {
            margin: 3rem 0 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--gray-800);
            font-size: 1.125rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            letter-spacing: -0.01em;
        }

        .section-count {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--gray-400);
            background: var(--gray-50);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--card-radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: all 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            height: 100%;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border-color: var(--primary-200);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-title h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.4;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .card-title p {
            font-size: 0.75rem;
            color: var(--text-sub);
            margin-top: 0.25rem;
        }

        .trend-badge {
            font-size: 0.7rem;
            font-weight: 800;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .trend-up {
            background: var(--primary-50);
            color: var(--primary-600);
            border: 1px solid var(--primary-100);
        }

        .trend-down {
            background: #fff1f2;
            color: #e11d48;
            border: 1px solid #ffe4e6;
        }

        .metric-value {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .chart-container {
            height: 120px;
            width: 100%;
            position: relative;
        }

        .footer-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--gray-400);
            padding-top: 0.75rem;
            border-top: 1px solid var(--gray-100);
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .export-btn {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .export-btn:hover {
            background: var(--primary-50);
            border-color: var(--primary-200);
        }

        .export-btn svg {
            width: 14px;
            height: 14px;
            fill: var(--gray-400);
        }

        .export-btn:hover svg {
            fill: var(--primary-green);
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            .header-top {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <main>
        <header>
            <div class="header-top">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input"
                        placeholder="Search metrics..."
                        onkeyup="handleSearch(this.value)">
                </div>
                <div class="filters">
                    <button class="filter-btn active" onclick="setSector('All')">All Sectors</button>
                    <button class="filter-btn" onclick="setSector('Auto')">Auto</button>
                    <button class="filter-btn" onclick="setSector('Banking & Payments')">Banking & Payments</button>
                    <button class="filter-btn" onclick="setSector('AMC')">AMC</button>
                </div>
            </div>

            <div class="controls">
                <div class="subsector-nav" id="subsector-nav">
                    <!-- Subsector shortcuts -->
                </div>
            </div>
        </header>

    <div id="content-area">
        <!-- Sections and Cards will be injected here -->
    </div>

    </main>
    <script>
        let allData = [];
        let currentFilter = 'All';
        let currentSearch = '';
        let charts = {};

        async function init() {
            try {
                // If dashboardData is already loaded via <script> tag, use it.
                if (window.dashboardData && window.dashboardData.length > 0) {
                    allData = window.dashboardData;
                    console.log('Using window.dashboardData (CORS Bypass)');
                } else {
                    // Fallback to fetch (for server environments)
                    const response = await fetch('data/dashboard_data.json');
                    allData = await response.json();
                }
                renderAll();
                setupIntersectionObserver();
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function setSector(sector) {
            currentFilter = sector;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.includes(sector));
            });
            renderAll();
        }

        function handleSearch(val) {
            currentSearch = val.toLowerCase();
            renderAll();
        }

        function renderAll() {
            const area = document.getElementById('content-area');
            const nav = document.getElementById('subsector-nav');
            area.innerHTML = '';
            nav.innerHTML = '';

            let filtered = allData.filter(item => {
                const matchesSector = currentFilter === 'All' || item.sector === currentFilter;
                const matchesSearch = !currentSearch ||
                    item.title.toLowerCase().includes(currentSearch) ||
                    item.subtitle.toLowerCase().includes(currentSearch) ||
                    item.subsector.toLowerCase().includes(currentSearch);
                return matchesSector && matchesSearch;
            });

            // Group by subsector
            const groups = {};
            filtered.forEach(item => {
                if (!groups[item.subsector]) groups[item.subsector] = [];
                groups[item.subsector].push(item);
            });

            // Iterate subsectors
            Object.keys(groups).sort().forEach(sub => {
                // Nav link
                const navBtn = document.createElement('span');
                navBtn.className = 'subsector-btn';
                navBtn.innerText = sub;
                navBtn.onclick = () => document.getElementById(`sec-${sub}`).scrollIntoView({ behavior: 'smooth' });
                nav.appendChild(navBtn);

                // Section
                const section = document.createElement('section');
                section.id = `sec-${sub}`;
                section.innerHTML = `
                    <div class="section-header">
                        ${sub} <span class="section-count">(${groups[sub].length} metrics)</span>
                    </div>
                `;

                const grid = document.createElement('div');
                grid.className = 'grid';

                groups[sub].forEach(item => {
                    const card = createCard(item);
                    grid.appendChild(card);
                });

                section.appendChild(grid);
                area.appendChild(section);
            });

        }

        function createCard(item) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="card-title">
                        <h3>${item.title}</h3>
                    </div>
                    <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 8px;">
                        <div class="trend-badge ${item.trend >= 0 ? 'trend-up' : 'trend-down'}">
                            ${item.trend >= 0 ? '↑' : '↓'} ${Math.abs(item.trend)}%
                        </div>
                        <button class="export-btn" title="Download to Excel" onclick="downloadExcel('${item.id}')">
                            <svg viewBox="0 0 24 24"><path d="M14,2H6C4.89,2 4,2.89 4,4V20C4,21.11 4.89,22 6,22H18C19.11,22 20,21.11 20,20V8L14,2M18,20H6V4H13V9H18V20M16,11V15H13V15H11V15H8L12,19L16,15H14V11H16Z"/></svg>
                        </button>
                    </div>
                </div>
                <div class="metric-value">${item.unit === 'Crores' ? '₹' : ''}${item.metric.toLocaleString('en-IN')} <span style="font-size:0.7rem; font-weight:400; color:var(--text-sub)">${item.unit}</span></div>
                <div class="chart-container">
                    <canvas id="chart-${item.id}" class="lazy-chart" data-labels='${JSON.stringify(item.labels)}' data-values='${JSON.stringify(item.values)}' data-color="${item.color}"></canvas>
                </div>
                <div class="footer-info">
                    <span>${item.sector} Pillar</span>
                    <span>MoM Tracker</span>
                </div>
            `;
            return card;
        }

        function setupIntersectionObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const canvas = entry.target;
                        if (!canvas.rendered) {
                            renderChart(canvas);
                            canvas.rendered = true;
                        }
                    }
                });
            }, { threshold: 0.1 });

            const observeCharts = () => {
                document.querySelectorAll('.lazy-chart').forEach(c => observer.observe(c));
            };

            // Run on initial and after renders
            observeCharts();
            const originalRender = renderAll;
            renderAll = function () {
                originalRender();
                observeCharts();
            };
        }

        function renderChart(canvas) {
            const labels = JSON.parse(canvas.dataset.labels);
            const values = JSON.parse(canvas.dataset.values);
            const color = canvas.dataset.color;

            new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        borderColor: color,
                        backgroundColor: (context) => {
                            const chart = context.chart;
                            const { ctx, chartArea } = chart;
                            if (!chartArea) return null;
                            const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
                            gradient.addColorStop(0, color + '33');
                            gradient.addColorStop(1, color + '00');
                            return gradient;
                        },
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false }, 
                        tooltip: { enabled: true, mode: 'index', intersect: false } 
                    },
                    scales: { 
                        x: { 
                            display: true,
                            grid: { display: false },
                            ticks: { font: { size: 8 }, maxRotation: 0, autoSkip: true }
                        }, 
                        y: { 
                            display: false,
                            grid: { color: 'rgba(0,0,0,0.03)' },
                            ticks: { font: { size: 8 } }
                        } 
                    }
                }
            });
        }

        function downloadExcel(id) {
            const item = allData.find(d => d.id === id);
            if (!item) return;

            const ws_data = [
                ["Date", item.title + " (" + item.unit + ")"]
            ];
            
            item.labels.forEach((label, index) => {
                ws_data.push([label, item.values[index]]);
            });

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(ws_data);
            XLSX.utils.book_append_sheet(wb, ws, "Metric Data");
            XLSX.writeFile(wb, `${item.title.replace(/ /g, '_')}_data.xlsx`);
        }

        init();
    </script>
</body>
