<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macro-Financial Insights Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="data/dashboard_data.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.9);
            --primary-green: #10b981;
            --dark-green: #064e3b;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem;
            min-height: 100vh;
        }

        header {
            max-width: 1400px;
            margin: 0 auto 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .title-group h1 {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--dark-green);
            letter-spacing: -0.025em;
        }

        .title-group p {
            color: var(--text-sub);
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-container {
            position: relative;
            flex-grow: 1;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            border: 1px solid var(--border-color);
            border-radius: 9999px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary-green);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-sub);
            pointer-events: none;
        }

        .filters {
            display: flex;
            gap: 0.5rem;
        }

        .filter-btn {
            background: white;
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-sub);
        }

        .filter-btn:hover {
            border-color: var(--primary-green);
            color: var(--primary-green);
        }

        .filter-btn.active {
            background: var(--primary-green);
            border-color: var(--primary-green);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);
        }

        .subsector-nav {
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            scrollbar-width: none;
        }

        .subsector-nav::-webkit-scrollbar {
            display: none;
        }

        .subsector-btn {
            white-space: nowrap;
            font-size: 0.75rem;
            color: var(--text-sub);
            cursor: pointer;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            border: 1px solid transparent;
        }

        .subsector-btn:hover {
            color: var(--primary-green);
        }

        .section-header {
            margin: 2rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border-color);
            color: var(--dark-green);
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-count {
            font-size: 0.875rem;
            font-weight: 400;
            color: var(--text-sub);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.25rem;
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            height: 100%;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-title h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1.2;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .card-title p {
            font-size: 0.7rem;
            color: var(--text-sub);
            margin-top: 0.2rem;
        }

        .trend-badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
        }

        .trend-up {
            background: #ecfdf5;
            color: #059669;
        }

        .trend-down {
            background: #fef2f2;
            color: #dc2626;
        }

        .metric-value {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .chart-container {
            height: 120px;
            width: 100%;
            position: relative;
        }

        .footer-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-sub);
            padding-top: 0.5rem;
            border-top: 1px solid #f1f5f9;
        }

        .export-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            opacity: 0.6;
        }

        .export-btn:hover {
            background: #f1f5f9;
            opacity: 1;
        }

        .export-btn svg {
            width: 14px;
            height: 14px;
            fill: var(--text-sub);
        }

        .export-btn:hover svg {
            fill: var(--primary-green);
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            .header-top {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-top">
            <div class="title-group">
                <h1>Sectoral Intelligence</h1>
                <p id="status-bar">Exhaustive Metric Dashboard • 698 Live Series</p>
            </div>
            <div class="filters">
                <button class="filter-btn active" onclick="setSector('All')">All Sectors</button>
                <button class="filter-btn" onclick="setSector('Auto')">Auto</button>
                <button class="filter-btn" onclick="setSector('Banking & Payments')">Banking & Payments</button>
                <button class="filter-btn" onclick="setSector('AMC')">AMC</button>
            </div>
        </div>

        <div class="controls">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input"
                    placeholder="Search metrics..."
                    onkeyup="handleSearch(this.value)">
            </div>
            <div class="subsector-nav" id="subsector-nav">
                <!-- Subsector shortcuts -->
            </div>
        </div>
    </header>

    <div id="content-area">
        <!-- Sections and Cards will be injected here -->
    </div>

    <script>
        let allData = [];
        let currentFilter = 'All';
        let currentSearch = '';
        let charts = {};

        async function init() {
            try {
                // If dashboardData is already loaded via <script> tag, use it.
                if (window.dashboardData && window.dashboardData.length > 0) {
                    allData = window.dashboardData;
                    console.log('Using window.dashboardData (CORS Bypass)');
                } else {
                    // Fallback to fetch (for server environments)
                    const response = await fetch('data/dashboard_data.json');
                    allData = await response.json();
                }
                renderAll();
                setupIntersectionObserver();
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('status-bar').innerText = 'Error loading data. Check console.';
            }
        }

        function setSector(sector) {
            currentFilter = sector;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.includes(sector));
            });
            renderAll();
        }

        function handleSearch(val) {
            currentSearch = val.toLowerCase();
            renderAll();
        }

        function renderAll() {
            const area = document.getElementById('content-area');
            const nav = document.getElementById('subsector-nav');
            area.innerHTML = '';
            nav.innerHTML = '';

            let filtered = allData.filter(item => {
                const matchesSector = currentFilter === 'All' || item.sector === currentFilter;
                const matchesSearch = !currentSearch ||
                    item.title.toLowerCase().includes(currentSearch) ||
                    item.subtitle.toLowerCase().includes(currentSearch) ||
                    item.subsector.toLowerCase().includes(currentSearch);
                return matchesSector && matchesSearch;
            });

            // Group by subsector
            const groups = {};
            filtered.forEach(item => {
                if (!groups[item.subsector]) groups[item.subsector] = [];
                groups[item.subsector].push(item);
            });

            // Iterate subsectors
            Object.keys(groups).sort().forEach(sub => {
                // Nav link
                const navBtn = document.createElement('span');
                navBtn.className = 'subsector-btn';
                navBtn.innerText = sub;
                navBtn.onclick = () => document.getElementById(`sec-${sub}`).scrollIntoView({ behavior: 'smooth' });
                nav.appendChild(navBtn);

                // Section
                const section = document.createElement('section');
                section.id = `sec-${sub}`;
                section.innerHTML = `
                    <div class="section-header">
                        ${sub} <span class="section-count">(${groups[sub].length} metrics)</span>
                    </div>
                `;

                const grid = document.createElement('div');
                grid.className = 'grid';

                groups[sub].forEach(item => {
                    const card = createCard(item);
                    grid.appendChild(card);
                });

                section.appendChild(grid);
                area.appendChild(section);
            });

            document.getElementById('status-bar').innerText = `${filtered.length} Metrics found in ${currentFilter} Mode`;
        }

        function createCard(item) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="card-title">
                        <h3>${item.title}</h3>
                        <p>${item.subtitle}</p>
                    </div>
                    <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 8px;">
                        <div class="trend-badge ${item.trend >= 0 ? 'trend-up' : 'trend-down'}">
                            ${item.trend >= 0 ? '↑' : '↓'} ${Math.abs(item.trend)}%
                        </div>
                        <button class="export-btn" title="Download to Excel" onclick="downloadExcel('${item.id}')">
                            <svg viewBox="0 0 24 24"><path d="M14,2H6C4.89,2 4,2.89 4,4V20C4,21.11 4.89,22 6,22H18C19.11,22 20,21.11 20,20V8L14,2M18,20H6V4H13V9H18V20M16,11V15H13V15H11V15H8L12,19L16,15H14V11H16Z"/></svg>
                        </button>
                    </div>
                </div>
                <div class="metric-value">${item.unit === 'Crores' ? '₹' : ''}${item.metric.toLocaleString('en-IN')} <span style="font-size:0.7rem; font-weight:400; color:var(--text-sub)">${item.unit}</span></div>
                <div class="chart-container">
                    <canvas id="chart-${item.id}" class="lazy-chart" data-labels='${JSON.stringify(item.labels)}' data-values='${JSON.stringify(item.values)}' data-color="${item.color}"></canvas>
                </div>
                <div class="footer-info">
                    <span>${item.sector} Pillar</span>
                    <span>MoM Tracker</span>
                </div>
            `;
            return card;
        }

        function setupIntersectionObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const canvas = entry.target;
                        if (!canvas.rendered) {
                            renderChart(canvas);
                            canvas.rendered = true;
                        }
                    }
                });
            }, { threshold: 0.1 });

            const observeCharts = () => {
                document.querySelectorAll('.lazy-chart').forEach(c => observer.observe(c));
            };

            // Run on initial and after renders
            observeCharts();
            const originalRender = renderAll;
            renderAll = function () {
                originalRender();
                observeCharts();
            };
        }

        function renderChart(canvas) {
            const labels = JSON.parse(canvas.dataset.labels);
            const values = JSON.parse(canvas.dataset.values);
            const color = canvas.dataset.color;

            new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        borderColor: color,
                        backgroundColor: (context) => {
                            const chart = context.chart;
                            const { ctx, chartArea } = chart;
                            if (!chartArea) return null;
                            const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
                            gradient.addColorStop(0, color + '33');
                            gradient.addColorStop(1, color + '00');
                            return gradient;
                        },
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false }, 
                        tooltip: { enabled: true, mode: 'index', intersect: false } 
                    },
                    scales: { 
                        x: { 
                            display: true,
                            grid: { display: false },
                            ticks: { font: { size: 8 }, maxRotation: 0, autoSkip: true }
                        }, 
                        y: { 
                            display: false,
                            grid: { color: 'rgba(0,0,0,0.03)' },
                            ticks: { font: { size: 8 } }
                        } 
                    }
                }
            });
        }

        function downloadExcel(id) {
            const item = allData.find(d => d.id === id);
            if (!item) return;

            const ws_data = [
                ["Date", item.title + " (" + item.unit + ")"]
            ];
            
            item.labels.forEach((label, index) => {
                ws_data.push([label, item.values[index]]);
            });

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(ws_data);
            XLSX.utils.book_append_sheet(wb, ws, "Metric Data");
            XLSX.writeFile(wb, `${item.title.replace(/ /g, '_')}_data.xlsx`);
        }

        init();
    </script>
</body>

</html>
